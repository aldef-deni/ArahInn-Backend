; Naikkan batas upload agar foto properti (maks 5MB/file, bisa banyak file
; sekaligus) tidak gagal diam-diam. Default cPanel sering 2M → foto >2MB hilang.
; cPanel PHP-FPM membaca .user.ini di docroot (public/). Berlaku <= 5 menit
; setelah diubah (atau restart PHP-FPM via cPanel).
upload_max_filesize = 10M
post_max_size = 25M
max_file_uploads = 30
memory_limit = 256M
max_execution_time = 120
